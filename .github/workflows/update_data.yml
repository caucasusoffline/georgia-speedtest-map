name: Update Ookla Data

on:
  schedule:
    - cron: '0 0 1 */3 *' 
  workflow_dispatch: 
    inputs:
      year:
        description: 'წელი (მაგ. 2022). ცარიელი - უახლესი მონაცემებისთვის'
        required: false
        type: string
      quarter:
        description: 'კვარტალი (1, 2, 3 ან 4). ცარიელი - უახლესი მონაცემებისთვის'
        required: false
        type: string

permissions:
  contents: write 

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 
      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install geopandas pyarrow requests
      - name: Run script
        run: |
          if [ -n "${{ github.event.inputs.year }}" ] && [ -n "${{ github.event.inputs.quarter }}" ]; then
            python fetch_ookla.py --year ${{ github.event.inputs.year }} --quarter ${{ github.event.inputs.quarter }}
          else
            python fetch_ookla.py
          fi
      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add data/
          git commit -m "Auto-update Georgia Ookla data" || exit 0
          git push
