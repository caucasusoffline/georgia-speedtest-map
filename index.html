<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ookla - საქართველოს ინტერნეტის სიჩქარე</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { width: 100vw; height: 100vh; }
        /* რუკის გადამრთველის დიზაინის ოდნავ გადიდება */
        .leaflet-control-layers { font-family: Arial, sans-serif; font-size: 15px; padding: 10px; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    var map = L.map('map').setView([42.0, 43.5], 7);

    // მუქი რუკის ფონი (მონაცემების ფერები უკეთ ჩანს)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://carto.com/">CARTO</a> | Data &copy; Ookla'
    }).addTo(map);

    function getColor(d) {
        return d > 100 ? '#800026' : 
               d > 50  ? '#BD0026' :
               d > 20  ? '#E31A1C' :
               d > 10  ? '#FC4E2A' :
               d > 5   ? '#FD8D3C' : '#FFEDA0';
    }

    function style(feature) {
        return {
            fillColor: getColor(feature.properties.avg_d_mbps),
            weight: 0.5,
            opacity: 1,
            color: '#333', 
            fillOpacity: 0.75
        };
    }

    function onEachFeature(feature, layer) {
        var p = feature.properties;
        var popupContent = `
            <div style="font-family: Arial; min-width: 180px;">
                <h3 style="margin: 0 0 10px 0; border-bottom: 1px solid #ccc; padding-bottom: 5px;">სიჩქარის დეტალები</h3>
                <b style="color: #2ca25f;">⬇️ ჩამოტვირთვა:</b> ${p.avg_d_mbps.toFixed(1)} Mbps<br>
                <b style="color: #2b8cbe;">⬆️ ატვირთვა:</b> ${p.avg_u_mbps.toFixed(1)} Mbps<br>
                <b style="color: #de2d26;">⏱️ Ping:</b> ${p.avg_lat_ms} ms<br>
                <hr style="border: 0; border-top: 1px solid #eee; margin: 10px 0;">
                <span style="font-size: 13px; color: #555;">
                    <b>📱 უნიკალური მოწყობილობა:</b> ${p.devices}<br>
                    <b>📊 ტესტების რაოდენობა:</b> ${p.tests}
                </span>
            </div>
        `;
        layer.bindPopup(popupContent);
    }

    // ვქმნით ცარიელ შრეებს (Layers) მობილურისა და ფიქსირებულისთვის
    var mobileLayer = L.layerGroup();
    var fixedLayer = L.layerGroup();

    // მობილური მონაცემების ჩატვირთვა
    fetch('data/georgia_mobile.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, { style: style, onEachFeature: onEachFeature }).addTo(mobileLayer);
            mobileLayer.addTo(map); // რუკის ჩატვირთვისას მობილური ავტომატურად ჩართული იქნება
        });

    // ფიქსირებული მონაცემების ჩატვირთვა
    fetch('data/georgia_fixed.geojson')
        .then(response => response.json())
        .then(data => {
            L.geoJSON(data, { style: style, onEachFeature: onEachFeature }).addTo(fixedLayer);
        });

    // მარჯვენა ზედა კუთხეში გადამრთველი მენიუს შექმნა
    var overlayMaps = {
        "📱 მობილური ინტერნეტი": mobileLayer,
        "🏠 ფიქსირებული (სახლის)": fixedLayer
    };

    L.control.layers(null, overlayMaps, {collapsed: false}).addTo(map);
</script>

</body>
</html>
